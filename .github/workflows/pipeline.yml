name: CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./Back

      - name: Lint backend
        run: npm run lint
        working-directory: ./Back

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Front

      - name: Lint frontend
        run: npm run lint
        working-directory: ./Front

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./Back

      - name: Run backend tests
        run: npm test
        working-directory: ./Back

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Front

      - name: Run frontend tests
        run: npm test
        working-directory: ./Front

  build-and-push:
    name: Build & push Docker images
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/tp2-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Back
          file: ./Back/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Tag metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/tp2-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Front
          file: ./Front/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy:
    name: Deploy to Docker Swarm
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: image-tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Copy stack file to manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_MANAGER_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: "docker-stack.yml"
          target: "~/tp2"

      - name: Deploy stack on manager
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_MANAGER_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
            export IMAGE_TAG=${{ steps.image-tag.outputs.tag }}
            cd ~/tp2
            docker stack deploy -c docker-stack.yml tp2
            docker service ls
